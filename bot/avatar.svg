<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1b2735"/>
      <stop offset="100%" stop-color="#090a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="rgba(245,200,66,0.3)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="wand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#4a3520"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="50%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="280" r="200" fill="url(#glow)"/>

  <!-- Stars -->
  <g filter="url(#starGlow)" fill="#fff">
    <circle cx="80" cy="70" r="2" opacity="0.8"/>
    <circle cx="150" cy="45" r="1.5" opacity="0.6"/>
    <circle cx="380" cy="60" r="2" opacity="0.7"/>
    <circle cx="430" cy="100" r="1.5" opacity="0.5"/>
    <circle cx="60" cy="150" r="1" opacity="0.6"/>
    <circle cx="450" cy="180" r="1.5" opacity="0.7"/>
    <circle cx="120" cy="120" r="1" opacity="0.4"/>
    <circle cx="350" cy="30" r="1" opacity="0.5"/>
    <circle cx="220" cy="55" r="1.5" opacity="0.6"/>
    <circle cx="300" cy="80" r="1" opacity="0.5"/>
    <circle cx="40" cy="250" r="1" opacity="0.3"/>
    <circle cx="470" cy="260" r="1" opacity="0.4"/>
  </g>

  <!-- Wand -->
  <g transform="translate(256, 260) rotate(-35)">
    <rect x="-4" y="-10" width="8" height="140" rx="3" fill="url(#wand)"/>
    <rect x="-6" y="-14" width="12" height="10" rx="2" fill="#6b4c2a"/>
    <!-- Wand tip highlight -->
    <rect x="-2" y="-10" width="4" height="130" rx="2" fill="rgba(139,105,20,0.3)"/>
  </g>

  <!-- Magic sparkles at wand tip -->
  <g filter="url(#sparkle)">
    <!-- Main spark -->
    <circle cx="262" cy="250" r="6" fill="#f5c842" opacity="0.9"/>

    <!-- Spark rays -->
    <line x1="262" y1="232" x2="262" y2="222" stroke="#f5c842" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="262" y1="268" x2="262" y2="278" stroke="#f5c842" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="244" y1="250" x2="234" y2="250" stroke="#f5c842" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="280" y1="250" x2="290" y2="250" stroke="#f5c842" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

    <!-- Diagonal rays -->
    <line x1="249" y1="237" x2="242" y2="230" stroke="#ff6b9d" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="275" y1="263" x2="282" y2="270" stroke="#ff6b9d" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="249" y1="263" x2="242" y2="270" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="275" y1="237" x2="282" y2="230" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Floating sparkle particles -->
    <circle cx="230" cy="220" r="3" fill="#ff6b9d" opacity="0.6"/>
    <circle cx="295" cy="225" r="2.5" fill="#c084fc" opacity="0.5"/>
    <circle cx="240" cy="280" r="2" fill="#f5c842" opacity="0.5"/>
    <circle cx="290" cy="280" r="3" fill="#ff6b9d" opacity="0.4"/>
    <circle cx="220" cy="255" r="2" fill="#c084fc" opacity="0.4"/>
    <circle cx="305" cy="250" r="2" fill="#f5c842" opacity="0.5"/>
  </g>

  <!-- Heart -->
  <g transform="translate(256, 350)">
    <path d="M0,-15 C-5,-25 -20,-25 -20,-12 C-20,0 0,15 0,20 C0,15 20,0 20,-12 C20,-25 5,-25 0,-15Z" fill="#ff6b9d" opacity="0.85"/>
  </g>

  <!-- Small decorative stars around -->
  <g fill="#f5c842" opacity="0.6">
    <!-- 4-point star shape -->
    <polygon points="100,320 103,313 106,320 103,327" />
    <polygon points="400,310 403,303 406,310 403,317" />
    <polygon points="150,380 153,373 156,380 153,387" />
    <polygon points="370,370 373,363 376,370 373,377" />
  </g>
</svg>
